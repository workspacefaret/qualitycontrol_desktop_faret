<div class="module faret-module faret-usuarios-module">

    <div class="module-header">
        <div>
            <div class="module-title">Gestión de Usuarios</div>
            <div class="subtitle">Usuarios con acceso al panel Faret</div>
        </div>
        <div style="display:flex; gap:10px;">
            <button id="fu-exportar-btn" class="btn-secondary">Exportar Excel</button>
            <button id="fu-refresh-btn" class="btn-secondary">↻ Actualizar</button>
            <button id="fu-nuevo-btn" class="btn-primary">+ Nuevo usuario</button>
        </div>
    </div>

    <!-- Formulario nuevo usuario -->
    <div id="fu-form-card" class="card fu-form-card" style="display:none;">
        <div class="module-header">
            <div>
                <div class="module-title" style="font-size:1rem;">Nuevo usuario</div>
                <div class="subtitle">La clave inicial siempre será <strong>Faret2026</strong></div>
            </div>
        </div>

        <div class="fu-form-row">
            <div class="fu-form-campo">
                <label for="fu-form-username">RUT / Usuario</label>
                <input type="text" id="fu-form-username" placeholder="Ej: 180875344">
            </div>
            <div class="fu-form-campo">
                <label for="fu-form-nombre">Nombre</label>
                <input type="text" id="fu-form-nombre" placeholder="Nombre completo">
            </div>
            <div class="fu-form-campo">
                <label for="fu-form-rol">Rol</label>
                <select id="fu-form-rol">
                    <option value="ADMIN_TI">ADMINISTRADOR TI</option>
                    <option value="ADMIN">ADMIN</option>
                    <option value="CALIDAD">CALIDAD</option>
                    <option value="INSPECTOR">INSPECTOR</option>
                    <option value="CONSULTA" selected>CONSULTA</option>
                </select>
            </div>
            <div class="fu-form-campo">
                <label>Estado</label>
                <input type="text" value="Activo" disabled>
            </div>
            <div class="fu-form-acciones">
                <button id="fu-crear-btn" class="btn-primary">Crear usuario</button>
                <button id="fu-cancelar-btn" class="btn-secondary">Cancelar</button>
            </div>
        </div>

        <div id="fu-form-error" class="faret-error" style="display:none;"></div>
    </div>

    <div id="fu-mensaje" class="fi-success" style="display:none;"></div>

    <!-- Tabla -->
    <div class="card faret-registros-card">
        <div id="fu-loading" class="faret-loading" style="display:none;">Cargando...</div>
        <div id="fu-error" class="faret-error" style="display:none;"></div>

        <div class="table-container">
            <table class="table faret-table" id="fu-tabla">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>RUT / Usuario</th>
                        <th>Nombre</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Creado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="fu-tbody">
                    <tr><td colspan="7" class="faret-empty">Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

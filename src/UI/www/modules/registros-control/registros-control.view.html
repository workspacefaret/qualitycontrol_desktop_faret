<div class="module">

  <div class="module-header">
    <div>
      <div class="module-title">Registros de Control</div>
      <div class="subtitle">Monitoreo operacional de controles registrados desde la app móvil</div>
    </div>

    <div class="module-actions">
      <button class="btn-secondary" id="btnExportarRegistrosControl">Exportar Excel</button>
      <button class="btn-secondary" id="btnLimpiarRegistros">Limpiar</button>
      <button class="btn-primary" id="btnBuscarRegistros">Filtrar</button>
    </div>
  </div>

  <div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Total registros</div>
      <div class="kpi-value" id="kpiTotalRegistros">0</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-label">Página actual</div>
      <div class="kpi-value" id="kpiPaginaActual">1</div>
    </div>

    <div class="kpi-card">
      <div class="kpi-label">Registros visibles</div>
      <div class="kpi-value" id="kpiVisibles">0</div>
    </div>
  </div>

  <div class="card">
    <div class="filters registros-control-filters">
      <input type="text" id="fechaDesdeRegistros" placeholder="Seleccionar fecha" />
      <input type="text" id="fechaHastaRegistros" placeholder="Seleccionar fecha" />
      <input type="text" id="filtroNpRegistros" placeholder="Buscar NP" />

      <select id="filtroTurnoRegistros">
        <option value="">Todos los turnos</option>
        <option value="A">Turno A</option>
        <option value="B">Turno B</option>
        <option value="C">Turno C</option>
      </select>

      <input type="text" id="filtroEstadoRegistros" placeholder="Estado" />
    </div>
  </div>

  <div class="card">
    <div class="table-container">
      <table class="table" id="tablaRegistrosControl">
        <thead>
          <tr>
            <th>ID</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Usuario</th>
            <th>Proceso</th>
            <th>Máquina</th>
            <th>Formulario</th>
            <th>NP</th>
            <th>Turno</th>
            <th>Estado</th>
            <th>Observación</th>
            <th>Estado Validación</th>
            <th>Acciones</th>
            <th>Imagen</th>
          </tr>
        </thead>

        <tbody id="tbodyRegistrosControl">
          <tr>
            <td colspan="14">Cargando...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="paginacionRegistrosControl"></div>
  </div>

</div>
